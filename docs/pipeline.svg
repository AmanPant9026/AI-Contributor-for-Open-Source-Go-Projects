<svg viewBox="0 0 950 150" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- connectors: main row (y=73) -->
  <g stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <line x1="86"  y1="73" x2="108" y2="73"/>
    <line x1="204" y1="73" x2="226" y2="73"/>
    <line x1="334" y1="73" x2="356" y2="73"/>
    <line x1="500" y1="73" x2="522" y2="73"/>
    <line x1="612" y1="73" x2="634" y2="73"/>
    <!-- branch from validate -->
    <line x1="742" y1="73" x2="828" y2="42"/>
    <line x1="742" y1="73" x2="828" y2="106"/>
  </g>

  <!-- nodes: pipeline steps -->
  <g>
    <!-- issue -->
    <rect x="10" y="56" width="76" height="34" rx="17" fill="#475569"/>
    <text x="48" y="77" text-anchor="middle" font-size="14" fill="#ffffff">issue</text>

    <!-- localize -->
    <rect x="112" y="48" width="92" height="50" rx="10" fill="#6366f1"/>
    <text x="158" y="78" text-anchor="middle" font-size="14" fill="#ffffff">localize</text>

    <!-- reproduce -->
    <rect x="226" y="48" width="108" height="50" rx="10" fill="#6366f1"/>
    <text x="280" y="78" text-anchor="middle" font-size="14" fill="#ffffff">reproduce</text>

    <!-- evidence ladder -->
    <rect x="356" y="48" width="144" height="50" rx="10" fill="#6366f1"/>
    <text x="428" y="78" text-anchor="middle" font-size="14" fill="#ffffff">evidence ladder</text>

    <!-- repair -->
    <rect x="522" y="48" width="90" height="50" rx="10" fill="#6366f1"/>
    <text x="567" y="78" text-anchor="middle" font-size="14" fill="#ffffff">repair</text>

    <!-- validate (gate) -->
    <rect x="634" y="48" width="108" height="50" rx="10" fill="#f59e0b"/>
    <text x="688" y="78" text-anchor="middle" font-size="14" fill="#111827">validate</text>
  </g>

  <!-- outcomes -->
  <g>
    <!-- draft PR -->
    <rect x="832" y="20" width="108" height="44" rx="22" fill="#16a34a"/>
    <text x="886" y="47" text-anchor="middle" font-size="14" fill="#ffffff">draft PR</text>

    <!-- abstain -->
    <rect x="832" y="84" width="108" height="44" rx="22" fill="#6b7280"/>
    <text x="886" y="111" text-anchor="middle" font-size="14" fill="#ffffff">abstain</text>
  </g>

  <!-- edge labels on the branch (pills so they read on any theme) -->
  <g>
    <rect x="757" y="36" width="58" height="20" rx="10" fill="#dcfce7"/>
    <text x="786" y="50" text-anchor="middle" font-size="11" fill="#166534">all pass</text>

    <rect x="757" y="92" width="58" height="20" rx="10" fill="#fee2e2"/>
    <text x="786" y="106" text-anchor="middle" font-size="11" fill="#991b1b">any fail</text>
  </g>
</svg>
